# 应用基本信息
app:
  name: "my-application"          # 应用标识名（英文，用于内部识别）
  display_name: "我的应用"         # 显示名称（中文，用于界面展示）
  description: "这是一个示例应用"    # 应用详细描述
  version: "1.0.0"                # 应用版本

# 缓存配置（支持三种缓存类型）
cache:
  # BigCache配置（内存缓存）
  bigcache:
    enabled: true
    shards: 128                    # 分片数量
    life_window: "10m"             # 条目存活时间
    clean_window: "5m"             # 清理间隔
    max_entries_in_window: 1000    # 窗口时间内最大条目数
    max_entry_size: 500            # 单个条目最大大小（KB）
    verbose: false                 # 是否输出详细日志
    hard_max_cache_size: 8192      # 最大缓存大小（MB）

  # BadgerDB配置（本地持久化键值存储）
  badger:
    enabled: true
    path: "./data/badger"          # 数据存储路径
    in_memory: false               # 是否纯内存模式
    sync_writes: true              # 是否同步写入
    value_log_file_size: 1024      # 值日志文件大小（MB）
    num_compactors: 2              # 压缩器数量
    num_level_zero_tables: 5       # Level 0表数量
    num_level_zero_tables_stall: 10 # Level 0表停滞数量
    value_log_load_size: 256       # 值日志加载大小（MB）

  # Redis配置（远程缓存）
  redis:
    enabled: false
    address: "localhost:6379"      # Redis服务器地址
    password: ""                   # 认证密码
    db: 0                          # 数据库索引
    pool_size: 10                  # 连接池大小
    min_idle_conns: 5              # 最小空闲连接数
    dial_timeout: "5s"             # 连接超时时间
    read_timeout: "3s"             # 读取超时时间
    write_timeout: "3s"            # 写入超时时间
    idle_timeout: "5m"             # 空闲连接超时时间
    max_conn_age: "30m"            # 连接最大存活时间

# RSA密钥配置（用于参数解密）
rsa_keys:
  private_key: |
    -----BEGIN PRIVATE KEY-----
    MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQC7...
    -----END PRIVATE KEY-----
  public_key: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuy...
    -----END PUBLIC KEY-----

# 文件上传配置（支持多种存储后端）
file_upload:
  # 本地存储配置
  local:
    enabled: true
    upload_dir: "./uploads"        # 上传文件存储目录
    max_size: "10MB"               # 单文件最大尺寸
    allowed_types: [ "image/jpeg", "image/png", "application/pdf" ]

  # Amazon S3配置
  s3:
    enabled: false
    bucket: "my-bucket"            # S3存储桶名称
    region: "us-west-1"            # 区域
    access_key: "AKIAIOSFODNN7EXAMPLE"
    secret_key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    endpoint: ""                   # 自定义端点（可选）

  # 阿里云OSS配置
  oss:
    enabled: false
    bucket: "my-bucket"
    endpoint: "oss-cn-hangzhou.aliyuncs.com"
    access_key_id: "LTAI5txxxxxxxxxxxx"
    access_key_secret: "MOk8x0xxxxxxxxxxxxxxxxxxxxxx"

# 静态资源挂载配置
static_mounts:
  - url_prefix: "/static"          # 对外URL前缀
    local_path: "./public/static"  # 本地文件系统路径
    browseable: false              # 是否允许目录浏览

  - url_prefix: "/uploads"
    local_path: "./uploads"
    browseable: true
    index_file: "index.html"       # 目录默认文件

# 日志收集配置（支持多种日志服务）
logging:
  # 控制台输出
  console:
    enabled: true
    level: "info"                  # 日志级别: debug, info, warn, error

  # Loki日志收集
  loki:
    enabled: false
    url: "http://loki:3100/loki/api/v1/push"
    labels:
      job: "my-application"
      environment: "production"
    batch_size: 102400             # 批量发送大小
    timeout: "10s"                 # 超时时间

  # 阿里云SLS配置
  sls:
    enabled: false
    endpoint: "cn-hangzhou.log.aliyuncs.com"
    project: "my-project"
    logstore: "my-logstore"
    access_key_id: "LTAI5txxxxxxxxxxxx"
    access_key_secret: "MOk8x0xxxxxxxxxxxxxxxxxxxxxx"

  # 文件日志输出
  file:
    enabled: true
    path: "./logs/app.log"
    max_size: "100MB"
    max_backups: 10
    max_age: "30d"
    compress: true

# 其他应用参数
settings:
  port: 8080                       # 服务监听端口
  read_timeout: "30s"              # 读取超时
  write_timeout: "30s"             # 写入超时
  max_connections: 1000            # 最大连接数
  cache_strategy: "bigcache"       # 默认缓存策略：bigcache, badger, redis